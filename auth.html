<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VKPlay — התחברות</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0f; color: #f0f0f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #16161f; border: 1px solid #ffffff18; border-radius: 20px; padding: 2rem 1.75rem; text-align: center; max-width: 360px; width: 92%; }
  .logo { font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
  .logo em { font-style: normal; color: #4f6ef7; }
  .status { font-size: 2rem; margin-bottom: 0.75rem; }
  h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; }
  p { color: #6b6b8a; font-size: 0.85rem; line-height: 1.5; margin-bottom: 1.5rem; }
  .btn { display: block; width: 100%; padding: 0.85rem; border-radius: 12px; border: none; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.2s; margin-bottom: 0.6rem; }
  .btn-primary { background: linear-gradient(135deg, #4f6ef7, #a855f7); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: #1c1c27; color: #f0f0f8; border: 1px solid #ffffff18; }
  .btn-secondary:hover { background: #22222f; }
  .copied { color: #10b981; font-size: 0.8rem; margin-top: 0.4rem; display: none; }
  .error { color: #fca5a5; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 10px; padding: 0.75rem; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="logo">VK<em>Play</em></div>
  <div class="status" id="status">⏳</div>
  <h2 id="title">מתחבר...</h2>
  <p id="desc">אנא המתן</p>
  <div id="actions"></div>
</div>

<script>
const hash = location.hash.slice(1);
const params = Object.fromEntries(new URLSearchParams(hash));
const token = params.access_token;
const expires = params.expires_in;

if (!token) {
  document.getElementById('status').textContent = '❌';
  document.getElementById('title').textContent = 'לא נמצא טוקן';
  document.getElementById('desc').textContent = 'סגור חלון זה ונסה שוב.';
} else {
  document.getElementById('status').textContent = '✅';
  document.getElementById('title').textContent = 'התחברת בהצלחה!';
  document.getElementById('desc').textContent = 'לחץ על הכפתור כדי לחזור לאתר ולהתחבר אוטומטית.';
  
  const actions = document.getElementById('actions');

  // Try postMessage first (if opened as popup)
  if (window.opener) {
    try {
      window.opener.postMessage({
        type: 'vk_token',
        token: token,
        expires_in: expires
      }, '*');
      document.getElementById('title').textContent = 'מחובר! 🎉';
      document.getElementById('desc').textContent = 'הפופאפ ייסגר תוך שנייה...';
      setTimeout(() => window.close(), 800);
    } catch(e) {
      showManual();
    }
  } else {
    showManual();
  }

  function showManual() {
    actions.innerHTML = `
      <button class="btn btn-primary" onclick="copyAndClose()">📋 העתק טוקן וחזור לאתר</button>
      <div class="copied" id="copied">✓ הועתק! עכשיו חזור לאתר והדבק בשדה</div>
      <button class="btn btn-secondary" onclick="window.close()">סגור חלון</button>
    `;
  }
}

function copyAndClose() {
  if (!token) return;
  navigator.clipboard.writeText(token).then(() => {
    document.getElementById('copied').style.display = 'block';
    // Also try postMessage one more time
    if (window.opener) {
      try {
        window.opener.postMessage({ type: 'vk_token', token, expires_in: expires }, '*');
        setTimeout(() => window.close(), 600);
      } catch(e) {}
    }
  }).catch(() => {
    // Fallback: select text
    const inp = document.createElement('input');
    inp.value = token;
    document.body.appendChild(inp);
    inp.select();
    document.execCommand('copy');
    document.body.removeChild(inp);
    document.getElementById('copied').style.display = 'block';
  });
}
</script>
</body>
</html>
