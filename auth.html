<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VK Auth</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
  .box { background: #fff; border-radius: 16px; padding: 2rem; text-align: center; max-width: 360px; width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h2 { margin-bottom: 0.5rem; color: #333; }
  p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .btn { background: #4f6ef7; color: #fff; border: none; border-radius: 10px; padding: 0.8rem 2rem; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; }
  .btn:hover { opacity: 0.85; }
  .success { color: #10b981; font-size: 1.5rem; margin-bottom: 0.5rem; }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="success">✓</div>
  <h2>התחברת בהצלחה!</h2>
  <p>לחץ על הכפתור כדי לחזור לאתר</p>
  <button class="btn" onclick="sendToken()">חזור ל-VKPlay</button>
</div>
<script>
  const hash = location.hash.slice(1);
  const params = Object.fromEntries(new URLSearchParams(hash));

  function sendToken() {
    if (!params.access_token) {
      alert('לא נמצא טוקן');
      return;
    }
    if (window.opener) {
      window.opener.postMessage({
        type: 'vk_token',
        token: params.access_token,
        expires_in: params.expires_in
      }, 'https://vkvideos.netlify.app');
      window.close();
    } else {
      // fallback: redirect with token in hash
      window.location.href = 'https://vkvideos.netlify.app/#vk_token=' + params.access_token + '&expires_in=' + (params.expires_in || 86400);
    }
  }

  // Try auto-send if opener exists
  if (window.opener && params.access_token) {
    sendToken();
  }
</script>
</body>
</html>
